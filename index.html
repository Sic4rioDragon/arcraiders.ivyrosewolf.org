<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ARC Raiders | IvyRoseWolf</title>

  <link rel="icon" type="image/png" href="https://sic4riodragon.uk/assets/favicon.png" />
  <link rel="stylesheet" href="https://arcraiders.sic4riodragon.uk/assets/css/site.css" />
</head>
<body
  data-page="home"
  data-account="ivy"
  data-base-path=""
  data-data-root=""
  data-core-root="https://arcraiders.sic4riodragon.uk/"
>
  <div class="bg"></div>

  <header class="topbar">
    <a class="brand" href="/">
      <img class="brand-logo" src="https://arcraiders.sic4riodragon.uk/assets/arcraider_logo.png" alt="ARC Raiders">
      <span>
        <strong>ARC Raiders</strong>
        <small>Ivy's tracker</small>
      </span>
    </a>

    <nav class="nav">
      <a class="active" href="/">Overview</a>
      <a href="/quests/">Quests</a>
      <a href="/logbook/">Logbook</a>
      <a href="/projects/">Projects</a>
      <a href="/achievements/">Achievements</a>
    </nav>
  </header>

  <main class="wrap">
    <section class="hero card">
      <div>
        <p id="home-eyebrow" class="eyebrow">ARC Raiders</p>
        <h1 id="home-title">Ivy's ARC Raiders Tracker</h1>
      </div>

      <div class="hero-stats">
        <div>
          <strong id="stat-active">0</strong>
          <span>active quests</span>
        </div>
        <div>
          <strong id="stat-completed">0</strong>
          <span>completed quests</span>
        </div>
        <div>
          <strong id="stat-projects">0</strong>
          <span>projects</span>
        </div>
        <div>
          <strong id="stat-achievements">0%</strong>
          <span>achievements</span>
        </div>
      </div>
    </section>

    <section class="grid two">
      <div class="panel">
        <div class="section-title">
          <h2>Tracked quests</h2>
          <a href="/quests/">View all</a>
        </div>
        <div id="home-quests" class="quest-list compact"></div>
      </div>

      <div class="panel">
        <div class="section-title">
          <h2>Tracked resources</h2>
          <a href="/logbook/">Logbook</a>
        </div>
        <div id="home-resources" class="resource-list"></div>
      </div>
    </section>

    <section class="panel" style="margin-top:18px">
      <div class="section-title">
        <h2>Projects</h2>
        <a href="/projects/">View all</a>
      </div>
      <div id="home-projects" class="project-grid"></div>
    </section>
  </main>

  <script src="https://arcraiders.sic4riodragon.uk/assets/js/main.js"></script>
</body>
</html>
